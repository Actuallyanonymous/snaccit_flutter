name: snaccit_flutter
description: "Snaccit - Skip the queue, order ahead!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  
  # State Management
  provider: ^6.1.2
  
  # Utils
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.3
  webview_flutter: ^4.13.1
  phonepe_payment_sdk: ^2.0.3
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
